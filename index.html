<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>KuisKompanen – Kaart</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control" content="public, max-age=86400">

<!-- Leaflet lokaal laden -->
<link rel="stylesheet" href="leaflet/leaflet.css" />
<script src="leaflet/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

#map {
  height: 600px;
  width: 100%;
}

#status-box {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.95);
  padding: 10px 16px;
  border-radius: 6px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  z-index: 1000;
  font-size: 14px;
  text-align: center;
}
</style>
</head>

<body>

<div id="map"></div>

<div id="status-box">
<strong>Zones worden geladen</strong><br>
Duurt dit lang? Probeer een andere browser.
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

  const statusBox = document.getElementById('status-box');

  const map = L.map('map').setView([50.935, 4.038], 13);

  // Snellere en stabielere onderlaag
  L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    {
      attribution: '© OpenStreetMap, © CARTO',
      maxZoom: 19
    }
  ).addTo(map);

  const zonesUrl = 'zones_alles.geojson';

  const geclaimdUrl =
    'https://script.google.com/macros/s/AKfycbzppEk5LhqHSUPMAPeZF0jAsP6gGEbArWCab1PrqvhxHWKOclUyzLjfN9cdp-_b9MJS/exec';

  const formBaseUrl =
    'https://docs.google.com/forms/d/e/1FAIpQLSdoXSSUOrJJgVrdDqeDvl5Iik8qWwsDibbRAoJD_1yNgd0jiQ/viewform?usp=pp_url&entry.1335095716=';

  Promise.all([
    fetch(zonesUrl).then(r => r.json()),

    fetch(geclaimdUrl)
      .then(r => {
        if (!r.ok) {
          throw new Error('Fout bij laden geclaimde zones');
        }
        return r.json();
      })
      .catch(err => {
        console.warn('Fallback: geclaimde zones niet beschikbaar', err);
        return [];
      })
  ])
  .then(([zonesData, geclaimdeZones]) => {

    L.geoJSON(zonesData, {
      style: feature => {
        const zoneCode = feature.properties.Zone;
        const isGeclaimd = geclaimdeZones.includes(zoneCode);

        return {
          color: isGeclaimd ? '#5bb7bc' : '#6fa800',
          fillColor: isGeclaimd ? '#87cdd2' : '#8fd400',
          fillOpacity: 0.7,
          weight: 2
        };
      },

      onEachFeature: (feature, layer) => {
        const zoneCode = feature.properties.Zone;

        if (!geclaimdeZones.includes(zoneCode)) {
          layer.on('click', () => {
            window.open(
              formBaseUrl + encodeURIComponent(zoneCode),
              '_blank'
            );
          });
        }
      }
    }).addTo(map);

    statusBox.style.display = 'none';

  })
  .catch(err => {
    console.error('Fout bij laden kaart:', err);
  });

});
</script>

</body>
</html>
``
