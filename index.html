<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>KuisKompanen – Zones</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
     }
    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>
<body>

<div id="map"></div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js// Kaart initialiseren (Aalst)
  const map = L.map('map').setView([50.935, 4.038], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  const zonesUrl = 'zones_alles.geojson';
  const geclaimdUrl = 'https://script.google.com/macros/s/AKfycbzppEk5LhqHSUPMAPeZF0jAsP6gGEbArWCab1PrqvhxHWKOclUyzLjfN9cdp-_b9MJS/exec';

  Promise.all([
    fetch(zonesUrl).then(res => res.json()),
    fetch(geclaimdUrl).then(res => res.json())
  ]).then(([zonesData, geclaimdeZones]) => {

    L.geoJSON(zonesData, {
      style: function(feature) {
        const zoneCode = feature.properties.zone;
        const isGeclaimd = geclaimdeZones.includes(zoneCode);

        return {
          color: isGeclaimd ? '#5bb7bc' : '#6fa800',
          fillColor: isGeclaimd ? '#87cdd2' : '#8fd400',
          fillOpacity: 0.7,
          weight: 2
        };
      },
      onEachFeature: function(feature, layer) {
        const zoneCode = feature.properties.zone;
        const isGeclaimd = geclaimdeZones.includes(zoneCode);

        layer.bindTooltip(
          isGeclaimd
            ? `${zoneCode} – reeds geclaimd`
            : `${zoneCode} – beschikbaar`
        );

        if (!isGeclaimd) {
          layer.on('click', function () {
            const formUrl =
              'https://docs.google.com/forms/d/e/1FAIpQLSdoXSSUOrJJgVrdDqeDvl5Iik8qWwsDibbRAoJD_1yNgd0jiQ/viewform?usp=pp_url&entry.1335095716=ZO+001';
            window.open(formUrl + encodeURIComponent(zoneCode), '_blank');
          });
        }
      }
    }).addTo(map);

  });
</script>

</body>
</html>
