<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <title>KuisKompanen – Opruimzones</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ✅ Leaflet correct geladen -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
       font-family: Arial, sans-serif;
    }

    #map {
      height: 600px;
      width: 100%;
    }

    /* Eenvoudige kadertekst */
    #status-box {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.95);
      padding: 10px 16px;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.25);
      font-size: 14px;
      z-index: 1000;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div id="status-box">
  <strong>Zones worden geladen</strong>
</div>

<!-- ✅ Leaflet correct geladen -->
<script src="https://unpkg.com/leaflet/dist/leafpt>
  const statusBox = document.getElementById('status-box');

  // Basiskaart: ALTIJD zichtbaar
  const map = L.map('map').setView([50.935, 4.038], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  const zonesUrl = 'zones_alles.geojson';
  const geclaimdUrl =
    'https://script.google.com/macros/s/AKfycbzppEk5LhqHSUPMAPeZF0jAsP6gGEbArWCab1PrqvhxHWKOclUyzLjfN9cdp-_b9MJS/exec';

  const formBaseUrl =
    'https://docs.google.com/forms/d/e/1FAIpQLSdoXSSUOrJJgVrdDqeDvl5Iik8qWwsDibbRAoJD_1yNgd0jiQ/viewform?usp=pp_url&entry.1335095716=';

  Promise.all([
    fetch(zonesUrl).then(r => r.json()),
    fetch(geclaimdUrl).then(r => r.json())
  ])
  .then(([zonesData, geclaimdeZones]) => {

    L.geoJSON(zonesData, {
      style: feature => {
        const zoneCode = feature.properties.Zone;
        const isGeclaimd = geclaimdeZones.includes(zoneCode);

        return {
          color: isGeclaimd ? '#5bb7bc' : '#6fa800',
          fillColor: isGeclaimd ? '#87cdd2' : '#8fd400',
          fillOpacity: 0.7,
          weight: 2
        };
      },
      onEachFeature: (feature, layer) => {
        const zoneCode = feature.properties.Zone;

        if (!geclaimdeZones.includes(zoneCode)) {
          layer.on('click', () => {
            window.open(
              formBaseUrl + encodeURIComponent(zoneCode),
              '_blank'
            );
          });
        }
      }
    }).addTo(map);

    // ✅ Zones zichtbaar → kadertekst weg
    statusBox.style.display = 'none';
  })
  .catch(() => {
    // ❌ Bij problemen:
    // kaart blijft zichtbaar
    // kadertekst blijft gewoon staan
  });
</script>

</body>
</html>
